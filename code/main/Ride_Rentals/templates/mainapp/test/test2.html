<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload</title>
    <style>
        .upload-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px; /* Adjust width as needed */
        }

        .dashed-border {
            border: 2px dashed #ccc;
            padding: 40px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cloud-icon {
            font-size: 48px; /* Adjust icon size */
            color: #673ab7; /* Indigo color for icon */
            margin-bottom: 10px;
        }

        .upload-text {
            color: #757575; /* Gray text color */
            margin-bottom: 10px;
        }

        .file-size-info {
            color: #9e9e9e; /* Lighter gray for file size info */
            font-size: 14px;
        }

        /* Style for the file input element (hidden by default) */
        #imageUpload {
            display: none;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <div class="dashed-border" onclick="document.getElementById('imageUpload').click();">
            <div class="cloud-icon"><ion-icon name="arrow-up-circle-outline"></ion-icon></div>
            <div class="upload-text">
                Drag and drop or 
                <span style="color: #673ab7;">Click here</span>
                <br> to upload Image.
            </div>
            <div class="file-size-info">Image size must be less than 5 MB</div>
        </div>
        <input type="file" id="imageUpload" accept="image/*"> 
    </div>

</body>
</html>
