{% extends 'mainapp/base.html' %}
{% block title %}Select Payment Method{% endblock %}

{% block head %}
<style>
    .payment-container {
        max-width: 500px;
        margin: auto;
        padding: 20px;
        text-align: center;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    .btn {
        padding: 10px 20px;
        background-color: skyblue;
        color: white;
        border: none;
        cursor: pointer;
    }

    .btn:hover {
        background-color: #007bff;
    }
</style>
{% endblock %}


{% block content %}
<div class="payment-container">
    <h1>Select Your Payment Method</h1>

    <form method="POST" action="{% url 'confirm_booking' slug=car.slug %}">
        {% csrf_token %}
        <label>
            <input type="radio" name="payment_method" value="UPI" required> UPI Payment (Google Pay, PhonePe, Paytm)
        </label><br>

        <label>
            <input type="radio" name="payment_method" value="Cash on Delivery" required> Cash on Delivery
        </label><br>

        <button type="submit" class="btn">Proceed to Payment</button>
    </form>

    <a href="{% url 'booking' car.slug %}" class="back-link">Go Back to Booking</a>
</div>
{% endblock %}
