{% extends 'mainapp/base.html' %}
{% block title %} Complete Payment {% endblock %}

{% block head %}

<style>
    .payment-container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
    text-align: center;
    background-color: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
}

img {
    margin-top: 10px;
    width: 200px;
    border: 2px solid #007bff;
    border-radius: 5px;
}

p {
    font-size: 16px;
    color: #333;
}

.btn {
    padding: 10px 20px;
    background-color: skyblue;
    color: white;
    border: none;
    cursor: pointer;
}

.btn:hover {
    background-color: #007bff;
}

</style>

{% endblock %}

{% block content %}
<div class="payment-container">
    <h1>Complete Your Payment</h1>
    <p>Scan the QR code or use the UPI ID to pay.</p>

    <img src="{% static 'mainapp/images/upi_qr.png' %}" alt="UPI QR Code" width="250" />

    <p>UPI ID: example@upi</p>

    <form action="{% url 'payment_success' booking_id=booking.id %}" method="POST">
        {% csrf_token %}
        <button type="submit" class="btn">I have paid</button>
    </form>
</div>
{% endblock %}
