{% extends 'mainapp/base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'mainapp/css/password-reset.css' %}">
{% endblock %}

{% block content %}
<div class="password-reset-container content-pd-t70">
    <div class="password-reset-content">
        <div class="password-confirm">
            <h2>Update Your Profile</h2>

            <form method="post" enctype="multipart/form-data" id="profile_update_form">
                {% csrf_token %}

                <div class="form-group-div">
                    <label for="id_first_name">First Name:</label>
                    <div class="form-group">
                        {{ form.first_name }}
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_last_name">Last Name:</label>
                    <div class="form-group">
                        {{ form.last_name }}
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_email">Email:</label>
                    <div class="form-group">
                        {{ form.email }}
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_phone_number">Phone Number:</label>
                    <div class="form-group">
                        {{ form.phone_number }}
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_profile_picture">Profile Picture:</label>
                    <div class="form-group">
                        {{ form.profile_picture }}
                    </div>
                </div>

                <!-- Profile Picture Preview -->
                <div class="profile-image-preview">
                        <img id="profile_preview" src="{{ user.profile.profile_picture.url }}" alt="Profile Picture" style="width:150px;height:150px;border-radius:50%;">
                </div>

                <button type="submit" class="btn">Update Profile</button>
            </form>
        </div>
    </div>
</div>

<!-- JavaScript to preview the uploaded image -->
<script>
    document.getElementById("id_profile_picture").addEventListener("change", function(event) {
        var file = event.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("profile_preview").src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
</script>

{% endblock %}
