{% extends 'mainapp/base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'mainapp/css/password-reset.css' %}">
{% endblock %}

{% block content %}
<div class="password-reset-container content-pd-t70">
    <div class="password-reset-content">
        <div class="password-confirm">
            <h2>Update Your Profile</h2>

            <form method="post" enctype="multipart/form-data" id="profile_update_form">
                {% csrf_token %}
                
                <div class="form-group-div">
                    <label for="id_first_name">First Name:</label>
                    <div class="form-group">
                        <input type="text" name="first_name" id="id_first_name" placeholder="First name" value="{{ user.first_name }}" required>
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_last_name">Last Name:</label>
                    <div class="form-group">
                        <input type="text" name="last_name" id="id_last_name" placeholder="Last name" value="{{ user.last_name }}" required>
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_email">Email:</label>
                    <div class="form-group">
                        <input type="email" name="email" id="id_email" placeholder="Email" value="{{ user.email }}" required>
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_phone_number">Phone Number:</label>
                    <div class="form-group">
                        <input type="tel" name="phone_number" id="id_phone_number" placeholder="Phone number" value="{{ user.profile.phone_number }}" required>
                    </div>
                </div>

                <div class="form-group-div">
                    <label for="id_profile_picture">Profile Picture:</label>
                    <div class="form-group">
                        <input type="file" name="profile_picture" id="id_profile_picture" accept="image/*">
                    </div>
                </div>

                <button type="submit" class="btn">Update Profile</button>
            </form>
        </div>
    </div>
</div>

<!-- <script src="{% static 'mainapp/js/profile-update.js' %}"></script> -->
{% endblock %}
