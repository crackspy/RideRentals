{% extends 'layout.html' %}

{% block content %}

<h1>List</h1>

{% for movie_obj in movies %}
    <h1>Title : {{ movie_obj.title | upper }}</h1>
    <p>Summary : {{ movie_obj.summary | default:"Information unavailable" | lower }}</p>
    <h4>Year : {{ movie_obj.year }}</h4>
{% endfor %}

{% endblock %}
