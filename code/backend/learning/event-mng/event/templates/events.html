
{% extends 'base.html' %}
{% load static %}

{% block title %}
Events
{% endblock %}

{% block head %}

<style>

/* Card container to center the card */
.card-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 10px;
}

/* Card styling */
.card {
    width: 300px;
    border: 1px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    background-color: #fff;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Card hover effect */
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
}

/* Image inside card */
.card-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Content inside the card */
.card-content {
    padding: 15px;
    text-align: center;
}

.card-heading {
    font-size: 1.5rem;
    margin: 10px 0;
    color: #333;
}

.card-text {
    font-size: 1rem;
    color: #666;
    line-height: 1.5;
}
.main-div {
    display: flex;
    align-items: center;
    justify-content: space-evenly;
    flex-wrap: wrap;
    margin: 5px;
}

</style>

{% endblock %}

{% block content %}

<h2 style="text-align: center;">Events</h2>


<div class="main-div">

    {% for i in eve %}
        <div class="card-container">
            <div class="card">
                <img src="{{ i.img.url }}" alt="Car Image" class="card-image">
                <div class="card-content">
                    <h2 class="card-heading">{{ i.name }}</h2>
                    <p class="card-text">{{ i.dec }}</p>
                </div>
            </div>
        </div>
    {% endfor %}

</div>

{% endblock %}
