{% extends 'mainapp/base.html' %}
{% load static %}

{% block title %} Book Your Ride {% endblock %}

{% block head %}

<style>
    body {
        background: linear-gradient(to right, #141e30, #243b55);
        /* color: #ffffff; */
    }

    .container {
        max-width: 800px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
    }

    h1 {
        text-align: center;
        color: #ffffff;
        font-size: 2.5em;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #f0f0f0;
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
    }

    .form-group input:focus, .form-group textarea:focus {
        outline: none;
        box-shadow: 0 0 8px rgba(79, 172, 254, 0.8);
    }

    .btn {
        display: block;
        width: 100%;
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
        color: #ffffff;
        background: linear-gradient(to right, #ff416c, #ff4b2b);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        transition: transform 0.3s, background 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        background: linear-gradient(to right, #ff4b2b, #ff416c);
    }

    .form-group textarea {
        resize: none;
    }

    footer {
        text-align: center;
        margin-top: 20px;
        color: #cccccc;
        font-size: 0.9em;
    }
</style>

{% endblock %}


{% block content %}

<div class="container">
    <h1>Book Your Luxury Ride</h1>
    <form action="/book" method="POST">
        <div class="form-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" name="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>

        <div class="form-group">
            <label for="pickup-date">Pick-Up Date</label>
            <input type="date" id="pickup-date" name="pickup_date" required>
        </div>

        <div class="form-group">
            <label for="return-date">Return Date</label>
            <input type="date" id="return-date" name="return_date" required>
        </div>

        <div class="form-group">
            <label for="pickup-location">Pick-Up Location</label>
            <input type="text" id="pickup-location" name="pickup_location" placeholder="Enter pick-up location" required>
        </div>

        <div class="form-group">
            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Enter any additional requests or information"></textarea>
        </div>

        <button type="submit" class="btn">Book Now</button>
    </form>
</div>

{% endblock %}
