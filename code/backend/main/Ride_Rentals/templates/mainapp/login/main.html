{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Animated Login</title>
  <link rel="stylesheet" href="{% static 'mainapp/css/login.css' %}">
  <link href="{% static 'mainapp/css/font-awesome/css/all.min.css' %}" rel="stylesheet">
</head>
<body>

  <!-- Background Image -->
  <div class="background-image"></div>

  <div class="container">

    <!-- Tab Navigation -->
    <div class="tabs">
      <button class="tab-button active" onclick="openTab('login')">Login</button>
      <button class="tab-button" onclick="openTab('register')">Register</button>
    </div>

    <!-- Login Tab Content -->
    <div id="login" class="login-container tab-content active">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Login to continue your journey</p>
      </div>

      <form id="loginForm">
        <!-- Username Input -->
        <div class="form-group">
          <input type="text" class="form-input" id="username" placeholder="Enter your username" required>
          <i class="input-icon fas fa-user"></i>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="password" placeholder="Password" required>
          <i class="input-icon fas fa-lock"></i>
        </div>

        <button type="submit" class="submit-button">Login</button>
      </form>

      <div class="additional-options">
        <a href="#">Forgot password?</a>
      </div>
    </div>

    <!-- Register Tab Content -->
    <div id="register" class="login-container tab-content">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Register to continue your journey</p>
      </div>

      <form id="registerForm">
        <!-- Username Input -->
        <div class="form-group">
          <input type="text" class="form-input" id="reg_username" placeholder="Enter your username" required>
          <i class="input-icon fas fa-user"></i>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <input type="email" class="form-input" id="email" placeholder="Email address" required>
          <i class="input-icon fas fa-envelope"></i>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="reg_password" placeholder="Enter your password" required>
          <i class="input-icon fas fa-lock"></i>
        </div>

        <!-- Confirm Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="confirm_password" placeholder="Confirm your password" required>
          <i class="input-icon fas fa-rotate"></i>
        </div>

        <button type="submit" class="submit-button">Register</button>
      </form>

    </div>

  </div>

  <script>
    // Tab Switching Logic
    function openTab(tabName) {
      const tabs = document.querySelectorAll('.tab-content');
      const buttons = document.querySelectorAll('.tab-button');

      tabs.forEach(tab => tab.classList.remove('active'));
      buttons.forEach(button => button.classList.remove('active'));

      document.getElementById(tabName).classList.add('active');
      document.querySelector(`[onclick="openTab('${tabName}')"]`).classList.add('active');
    }

  </script>

</body>
</html>
