<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Animated Login</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<link href="font-awesome/css/all.min.css" rel="stylesheet">

    <!-- Background Image -->
    <div class="background-image"></div>

    <div class="container">

        <div class="tabs">
            <button class="tab-button active" onclick="openTab('login')">Login</button>
            <button class="tab-button" onclick="openTab('register')">Register</button>
        </div>

        <div id="login" class="login-container tab-content active">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Login to continue your journey</p>
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <input
                        type="text"
                        class="form-input"
                        id="username"
                        placeholder="Enter your username"
                        required
                    >
                    <i class="input-icon fas fa-user"></i>
                    <!-- <span class="error-message" id="emailError"></span> -->
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        class="form-input"
                        id="password"
                        placeholder="Password"
                        required
                    >
                    <i class="input-icon fas fa-lock"></i>
                    <!-- <span class="error-message" id="passwordError"></span> -->
                </div>

                <button type="submit" class="submit-button">Login</button>
            </form>

            <div class="additional-options">
                <a href="#">Forgot password?</a>
            </div>
        </div>


        <div id="register" class="login-container tab-content">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Register to continue your journey</p>
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <input
                        type="text"
                        class="form-input"
                        id="username"
                        placeholder="Enter your username"
                        required
                    >
                    <i class="input-icon fas fa-user"></i>
                    <!-- <span class="error-message" id="emailError"></span> -->
                </div>

                <div class="form-group">
                    <input
                        type="email"
                        class="form-input"
                        id="email"
                        placeholder="Email address"
                        required
                    >
                    <i class="input-icon fas fa-envelope"></i>
                    <!-- <span class="error-message" id="emailError"></span> -->
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        class="form-input"
                        id="password"
                        placeholder="Enter your password"
                        required
                    >
                    <i class="input-icon fas fa-lock"></i>
                    <!-- <span class="error-message" id="passwordError"></span> -->
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        class="form-input"
                        id="confirm_password"
                        placeholder="Confirm your password"
                        required
                    >
                    <i class="input-icon fas fa-rotate"></i>
                    <!-- <span class="error-message" id="passwordError"></span> -->
                </div>

                <button type="submit" class="submit-button">Register</button>
            </form>

        </div>

    </div>

  <script  src="scripts.js"></script>
</body>
</html>
