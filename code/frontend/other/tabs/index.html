<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Tabs</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<div class="tabs">
  <div class="tabs__header">
    <button class="tabs__tab tabs__tab--active">Login</button>
    <button class="tabs__tab">Register</button>
  </div>
  <div class="tabs__content">
    <h2 class="tabs__title">Login to Your Account</h2>
    <p class="tabs__description">Welcome back! Please enter your credentials to access your account.</p>
    <form class="tabs__form">
      <div class="tabs__form-group">
        <label for="email" class="tabs__label">E-mail</label>
        <input type="email" name="email" placeholder="example@example.com" class="tabs__input" />
      </div>
      <div class="tabs__form-group">
        <label for="password" class="tabs__label">Password</label>
        <input type="password" name="password" class="tabs__input" />
      </div>
      <input type="submit" value="Log in" class="tabs__button">
    </form>
  </div>
</div>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
