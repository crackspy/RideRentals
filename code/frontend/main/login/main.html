<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Animated Login</title>
  <link rel="stylesheet" href="./style.css">
  <link href="font-awesome/css/all.min.css" rel="stylesheet">
  <style>
    /* General Reset and Styling */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    /* Background Image */
    .background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('background.jpg') no-repeat center center/cover;
      z-index: -1;
    }

    /* Container Styling */
    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 20px;
      color: white;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transform: translateY(20px);
      opacity: 0;
      animation: slideIn 0.6s ease-out forwards;
    }

    /* Sliding Effect */
    @keyframes slideIn {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Tab Navigation */
    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 10px;
    }

    .tab-button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 10px;
      transition: color 0.3s;
      color: #FFFFFF;
    }

    .tab-button.active {
      color: #FFFFFF;
      border-bottom: 2px solid #FFFFFF;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      height: calc(100% - 50px);
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
    }

    /* Login Header */
    .login-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .login-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(45deg, #fff, #ccc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
    }

    /* Form Group */
    .form-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 1rem;
      color: white;
      transition: all 0.3s ease;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.3s ease;
    }

    .form-input:focus + .input-icon {
      color: white;
    }

    /* Submit Button */
    .submit-button {
      width: 100%;
      padding: 1rem;
      background: white;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    /* Additional Options */
    .additional-options {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 10px;
    }

    .additional-options a {
      color: white;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .additional-options a:hover {
      opacity: 0.8;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        width: 90%;
        margin: 1rem;
        padding: 2rem;
      }

      .login-header h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 480px) {
      .form-input {
        padding: 0.8rem 0.8rem 0.8rem 2.5rem;
      }

      .input-icon {
        left: 0.8rem;
      }

      .login-header h1 {
        font-size: 1.8rem;
      }

      .tabs {
        flex-direction: column;
        align-items: center;
      }

      .tab-button {
        font-size: 14px;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Image -->
  <div class="background-image"></div>

  <div class="container">

    <!-- Tab Navigation -->
    <div class="tabs">
      <button class="tab-button active" onclick="openTab('login')">Login</button>
      <button class="tab-button" onclick="openTab('register')">Register</button>
    </div>

    <!-- Login Tab Content -->
    <div id="login" class="login-container tab-content active">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Login to continue your journey</p>
      </div>

      <form id="loginForm">
        <!-- Username Input -->
        <div class="form-group">
          <input type="text" class="form-input" id="username" placeholder="Enter your username" required>
          <i class="input-icon fas fa-user"></i>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="password" placeholder="Password" required>
          <i class="input-icon fas fa-lock"></i>
        </div>

        <button type="submit" class="submit-button">Login</button>
      </form>

      <div class="additional-options">
        <a href="#">Forgot password?</a>
      </div>
    </div>

    <!-- Register Tab Content -->
    <div id="register" class="login-container tab-content">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Register to continue your journey</p>
      </div>

      <form id="registerForm">
        <!-- Username Input -->
        <div class="form-group">
          <input type="text" class="form-input" id="reg_username" placeholder="Enter your username" required>
          <i class="input-icon fas fa-user"></i>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <input type="email" class="form-input" id="email" placeholder="Email address" required>
          <i class="input-icon fas fa-envelope"></i>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="reg_password" placeholder="Enter your password" required>
          <i class="input-icon fas fa-lock"></i>
        </div>

        <!-- Confirm Password Input -->
        <div class="form-group">
          <input type="password" class="form-input" id="confirm_password" placeholder="Confirm your password" required>
          <i class="input-icon fas fa-rotate"></i>
        </div>

        <button type="submit" class="submit-button">Register</button>
      </form>

    </div>

  </div>

  <script>
    // Tab Switching Logic
    function openTab(tabName) {
      const tabs = document.querySelectorAll('.tab-content');
      const buttons = document.querySelectorAll('.tab-button');

      tabs.forEach(tab => tab.classList.remove('active'));
      buttons.forEach(button => button.classList.remove('active'));

      document.getElementById(tabName).classList.add('active');
      document.querySelector(`[onclick="openTab('${tabName}')"]`).classList.add('active');
    }

  </script>

</body>
</html>
